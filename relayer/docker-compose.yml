services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
    networks:
      - relayer-network
    restart: on-failure:5

  relayer:
    image: openzeppelin/openzeppelin-relayer:latest
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      API_KEY: ${API_KEY}
      WEBHOOK_SIGNING_KEY: ${WEBHOOK_SIGNING_KEY}
      KEYSTORE_PASSPHRASE: ${KEYSTORE_PASSPHRASE}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ./config:/app/config
    networks:
      - relayer-network
    restart: on-failure:5

networks:
  relayer-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
